  lambda:
    build: ./lambda
    container_name: lambda
    depends_on:
      register_connector_sidecar:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
#      register_es_index_sidecar:
#        condition: service_completed_successfully
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: admin_password
      MONGO_DBNAME: metadata
      MONGO_DB_COLLECTION: data_assets
      PG_USER: user
      PG_PASSWORD: password
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DBNAME: registry
      KAFKA_SERVER: "kafka:9092"
      ES_URL: "http://elasticsearch:9200"
      ES_INDEX: data_assets
    entrypoint: ["python", "-u", "sync_registry_docdb.py"]

